<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Myrella</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      overflow: hidden;
      background: #0b0b14; /* fundo escuro */
    }

    /* CANVAS FUNDO */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }

    /* CONTEÚDO */
    .container {
      text-align: center;
      max-width: 90%;
      padding: 20px;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3rem);
      margin-bottom: 20px;
      color: rgb(247, 4, 206);
      text-shadow: 0px 0px 10px rgba(247, 4, 207, 0.212);
    }

    p {
      font-size: clamp(1rem, 3.5vw, 1.3rem);
      line-height: 1.6;
      opacity: 0.9;
    }

    button {
      margin-top: 30px;
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      background: white;
      color: black;
      font-size: clamp(0.9rem, 3vw, 1rem);
      cursor: pointer;
      transition: all 0.05s ease;
    }

    button:hover {
      transform: scale(1.08);
    }

    /* ANIMAÇÃO ENTRADA */
    .hidden {
      opacity: 0;
      transform: translateY(40px);
    }

    .show {
      opacity: 1;
      transform: translateY(0);
      transition: all 0.8s ease;
    }
        img {
  width: 60vw;
  max-width: 280px;
  height: 60vw;
  max-height: 280px;

  object-fit: cover;
  object-position: bottom center;
  border-radius: 50%;
}
  </style>
</head>

<body>

  <canvas id="particles"></canvas>

  <div class="container">
    <img src="img/WhatsApp Image 2026-04-19 at 21.30.43.jpeg" alt="">
    <h1 class="hidden">Myrella</h1>
    <p class="hidden txt">
      Feliz aníversário🩷 <br> Não sou muito bom em falar tudo pessoalmente...
      Então achei que esse seria um jeito melhor de falar como vc é uma pessoa incrível 
    </p>

    <button class="hidden" onclick="irParaProxima()">
      Continuar
    </button>
  </div>

  <script>
    // animação ao carregar
    const elements = document.querySelectorAll('.hidden');

    window.addEventListener('load', () => {
      elements.forEach((el, i) => {
        setTimeout(() => {
          el.classList.add('show');
        }, i * 300);
      });
    });

    function irParaProxima() {
      window.location.href = "./paginas/pagina2.html";
    }

    // ===== PARTICULAS =====
    // ===== PARTICULAS =====
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const particles = [];

// cor única: roxo neon puxando pro rosa
const particleColor = "rgba(180, 0, 255, 0.75)";

for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 3 + 1,
    speedY: Math.random() * 1 + 0.2
  });
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.y -= p.speedY;

    if (p.y < 0) {
      p.y = canvas.height;
      p.x = Math.random() * canvas.width;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

    // glow (brilho)
    ctx.shadowColor = particleColor;
    ctx.shadowBlur = 12;

    ctx.fillStyle = particleColor;
    ctx.fill();

    // reset shadow pra não afetar outras coisas
    ctx.shadowBlur = 0;
  });

  requestAnimationFrame(animate);
}

animate();

// RESPONSIVO
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
  </script>

</body>
</html>
